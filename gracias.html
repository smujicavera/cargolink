<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracias por registrarte - CargoLink</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#031b4e">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cargolink-style.css">
</head>
<body>
  <nav class="site-nav" aria-label="Navegación principal">
    <div class="nav-container">
      <a class="nav-logo" href="index.html" aria-label="CargoLink - inicio">
        <img src="images/logo.png" alt="CargoLink">
      </a>
      <ul class="navbar">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tarifas.html">Tarifas</a></li>
        <li><a href="ofertas.html">Ofertas</a></li>
        <li><a href="registro.html">Registro</a></li>
      </ul>
    </div>
  </nav>

  <section class="section" style="text-align:center; max-width:640px;">
    <h1 style="color: var(--color-primary);">✅ ¡Registro recibido con éxito!</h1>
    <p id="mensaje" style="font-size:1.15rem;"></p>
    <div style="margin-top:1.25rem;">
      <progress id="progressBar" value="0" max="100" style="width:100%; height:14px;"></progress>
      <p id="countdown" style="font-size:0.9rem; color:var(--color-text-muted);">Serás redirigido en 7 segundos...</p>
    </div>
    <p style="margin-top:2rem;">
      <a href="index.html" class="btn">Volver al inicio</a>
    </p>
  </section>

  <footer>
    <p>&copy; 2025 CargoLink. Todos los derechos reservados.</p>
    <p>Contacto: <a href="tel:+56995602717">+56 9 9560 2717</a> | <a href="mailto:contacto@cargolink.cl">contacto@cargolink.cl</a></p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(document.referrer.split('?')[1] || '');
      const rol = urlParams.get('rol');
      let mensaje = 'Gracias por unirte a la red de CargoLink. Pronto te contactaremos para ayudarte a comenzar.';
      if (rol === 'Conductor') {
        mensaje = 'Gracias por registrarte como conductor. Te contactaremos pronto para conectarte con nuevas oportunidades de carga.';
      } else if (rol === 'Empresa') {
        mensaje = 'Gracias por registrarte como empresa. En breve podrás publicar tus necesidades de transporte y contactar con conductores.';
      }
      document.getElementById('mensaje').textContent = mensaje;

      const totalSeconds = 7;
      let seconds = totalSeconds;
      const progressBar = document.getElementById('progressBar');
      const countdownText = document.getElementById('countdown');
      const interval = setInterval(() => {
        seconds--;
        countdownText.textContent = `Serás redirigido en ${seconds} segundo${seconds === 1 ? '' : 's'}...`;
        progressBar.value = 100 - (seconds * 100 / totalSeconds);
        if (seconds <= 0) {
          clearInterval(interval);
          window.location.href = 'index.html';
        }
      }, 1000);
    });
  </script>
</body>
</html>
