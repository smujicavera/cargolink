<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ofertas Disponibles - CargoLink</title>
  <meta name="description" content="Descubre ofertas de carga activas en todo Chile. Filtra por región y tipo de vehículo y postula por WhatsApp en segundos.">
  <meta name="theme-color" content="#031b4e">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="cargolink-style.css">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="site-nav" aria-label="Navegación principal">
    <div class="nav-container">
      <a class="nav-logo" href="index.html" aria-label="CargoLink - inicio">
        <img src="images/logo.png" alt="CargoLink">
      </a>
      <button class="nav-toggle" aria-expanded="false" aria-controls="menu-principal" aria-label="Abrir menú">
        <span></span>
      </button>
      <ul class="navbar" id="menu-principal">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="tarifas.html">Tarifas</a></li>
        <li><a href="ofertas.html" class="active">Ofertas</a></li>
        <li><a href="index.html#evaluacion">Evaluación</a></li>
        <li><a href="registro.html">Registro</a></li>
      </ul>
      <div class="redes-sociales nav-social">
        <a href="mailto:contacto@cargolink.cl" title="Correo" aria-label="Enviar correo"><img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="" loading="lazy"></a>
        <a href="https://wa.me/56995602717" target="_blank" rel="noopener" title="WhatsApp" aria-label="Chatear por WhatsApp"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="" loading="lazy"></a>
      </div>
    </div>
  </nav>

  <header class="hero">
    <h1>Ofertas Disponibles</h1>
    <p>Encuentra oportunidades según tu vehículo y ubicación.</p>
  </header>

  <section class="section filtros" aria-label="Filtros de ofertas">
    <label for="filtro-ubicacion" class="sr-only" style="position:absolute;left:-9999px;">Filtrar por ubicación</label>
    <select id="filtro-ubicacion" aria-label="Filtrar por ubicación">
      <option value="">Todas las ubicaciones</option>
    </select>

    <label for="filtro-tipo" class="sr-only" style="position:absolute;left:-9999px;">Filtrar por tipo</label>
    <select id="filtro-tipo" aria-label="Filtrar por tipo">
      <option value="">Todos los tipos</option>
      <option value="permanente">Permanente</option>
      <option value="temporal">Temporal</option>
    </select>

    <label for="filtro-texto" class="sr-only" style="position:absolute;left:-9999px;">Buscar por palabra clave</label>
    <input type="search" id="filtro-texto" placeholder="Buscar por palabra clave..." aria-label="Buscar ofertas">
  </section>

  <section class="section" style="padding-top:1rem;">
    <p id="contador-ofertas" class="section-lead" aria-live="polite"></p>
    <div class="grid grid-ofertas" aria-live="polite">
      <!-- Las ofertas serán cargadas dinámicamente desde ofertas-data.json -->
    </div>
  </section>

  <a class="whatsapp" href="https://wa.me/56995602717" target="_blank" rel="noopener" aria-label="Contacto rápido por WhatsApp">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="20" height="20" alt="" />
    Contacto rápido
  </a>

  <footer>
    <p>&copy; 2025 CargoLink. Todos los derechos reservados.</p>
    <p>Contacto: <a href="tel:+56995602717">+56 9 9560 2717</a> | <a href="mailto:contacto@cargolink.cl">contacto@cargolink.cl</a></p>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const toggle = document.querySelector(".nav-toggle");
      const menu = document.getElementById("menu-principal");
      const social = document.querySelector(".nav-social");
      if (toggle && menu) {
        toggle.addEventListener("click", () => {
          const open = menu.classList.toggle("open");
          if (social) social.classList.toggle("open", open);
          toggle.setAttribute("aria-expanded", String(open));
        });
      }
    });
  </script>
  <script src="cargolink-ofertas.js"></script>
</body>
</html>
